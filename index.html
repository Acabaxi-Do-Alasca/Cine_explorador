<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine Explorador</title>
    <!-- Ícone de Setas Cruzadas (Shuffle) -->
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/82/82012.png">
    <style>
        :root { --bg: #0f172a; --panel: #111827; --card: #1e293b; --accent: #38bdf8; --text: #e2e8f0; --text-dim: #94a3b8; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; font-size: 2.8rem; color: #f8fafc; text-shadow: 0 4px 10px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; gap: 15px; }
        h1 img { width: 50px; height: 50px; filter: invert(1); } /* Invertido para ficar branco/claro no tema escuro */
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .tab-btn { background: var(--card); border: 1px solid #334155; color: var(--text-dim); padding: 14px 28px; border-radius: 14px; cursor: pointer; transition: .3s; font-weight: bold; }
        .tab-btn.active { background: var(--accent); color: #082f49; border-color: var(--accent); box-shadow: 0 0 15px rgba(56,189,248,0.4); }
        .panel { background: var(--panel); border: 1px solid #334155; border-radius: 20px; padding: 25px; margin-bottom: 24px; display: none; animation: fadeIn 0.3s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .genres { display: flex; flex-wrap: wrap; gap: 12px; }
        .genre-btn { border: 1px solid #475569; background: var(--card); color: var(--text); padding: 12px 18px; border-radius: 999px; cursor: pointer; font-size: .9rem; transition: .2s; }
        .genre-btn.active { background: var(--accent); color: #082f49; border-color: var(--accent); font-weight: bold; }
        .search-box { display: flex; gap: 12px; }
        input { flex: 1; background: var(--card); border: 1px solid #334155; color: white; padding: 16px; border-radius: 15px; font-size: 1rem; outline: none; }
        .main-btn { background: #22c55e; color: white; border: none; border-radius: 15px; padding: 16px 25px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: .2s; }
        .main-btn:hover { background: #16a34a; transform: translateY(-2px); }
        .results-list { margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .result-item { background: var(--card); border: 1px solid #334155; border-radius: 15px; overflow: hidden; cursor: pointer; transition: .3s; position: relative; }
        .result-item:hover { transform: scale(1.05); border-color: var(--accent); z-index: 2; }
        .result-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .rating-tag { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 8px; font-size: 0.8rem; color: #fbbf24; font-weight: bold; backdrop-filter: blur(4px); }
        .result-item p { padding: 12px; text-align: center; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .movie-card { display: none; background: linear-gradient(145deg, #111827, #1e293b); border: 1px solid #334155; border-radius: 24px; overflow: hidden; margin-top: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .movie-content { display: grid; grid-template-columns: 350px 1fr; }
        .poster-wrap { background: #020617; display: flex; align-items: center; justify-content: center; }
        .poster-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .movie-info { padding: 35px; }
        .movie-title { font-size: 2.4rem; margin-bottom: 15px; line-height: 1.1; }
        .meta { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 25px; }
        .meta-item { background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.2); color: #7dd3fc; border-radius: 999px; padding: 8px 16px; font-size: .9rem; font-weight: 600; }
        .section-label { color: var(--text-dim); font-size: .85rem; text-transform: uppercase; letter-spacing: .15em; margin: 25px 0 10px; font-weight: bold; }
        .overview { line-height: 1.7; font-size: 1.05rem; color: #cbd5e1; }
        .watch-providers, .similar-movies { display: flex; flex-wrap: wrap; gap: 15px; }
        .provider { display: flex; flex-direction: column; align-items: center; width: 65px; gap: 6px; }
        .provider img { width: 48px; height: 48px; border-radius: 12px; }
        .provider-name { font-size: .7rem; color: var(--text-dim); text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .similar-item { width: 100px; cursor: pointer; transition: .2s; }
        .similar-item:hover { transform: translateY(-5px); }
        .similar-item img { width: 100%; border-radius: 8px; aspect-ratio: 2/3; object-fit: cover; border: 1px solid #334155; }
        .similar-item p { font-size: 0.7rem; text-align: center; margin-top: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        @media (max-width: 850px) { .movie-content { grid-template-columns: 1fr; } .movie-info { padding: 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <img src="https://cdn-icons-png.flaticon.com/512/82/82012.png" alt="Shuffle Icon">
            Cine Explorador
        </h1>
        <div class="tabs">
            <button id="btn-trending" class="tab-btn active" onclick="switchTab('trending')">Em Alta</button>
            <button id="btn-draw" class="tab-btn" onclick="switchTab('draw')">Sortear</button>
            <button id="btn-search" class="tab-btn" onclick="switchTab('search')">Pesquisar</button>
        </div>
 
        <div id="trendingPanel" class="panel active">
            <div id="trendingResults" class="results-list"></div>
        </div>
 
        <div id="drawPanel" class="panel">
            <div id="genres" class="genres"></div>
            <div class="actions" style="margin-top:20px;">
                <button class="main-btn" onclick="sortear()">Sortear Agora</button>
            </div>
        </div>
 
        <div id="searchPanel" class="panel">
            <div class="search-box">
                <input type="text" id="query" placeholder="Buscar filmes..." onkeyup="if(event.key==='Enter')searchMovies()">
                <button class="main-btn" onclick="searchMovies()">Buscar</button>
            </div>
            <div id="searchResults" class="results-list"></div>
        </div>
 
        <div id="movieCard" class="movie-card">
            <div class="movie-content">
                <div id="posterWrap" class="poster-wrap"></div>
                <div class="movie-info">
                    <h2 id="movieTitle" class="movie-title"></h2>
                    <div id="movieMeta" class="meta">
                        <div id="movieRating" class="meta-item"></div>
                        <div id="movieYear" class="meta-item"></div>
                    </div>
                    <div id="movieGenres" class="meta" style="margin-bottom: 25px;"></div>
 
                    <div class="section-label">Sinopse</div>
                    <p id="movieOverview" class="overview"></p>
 
                    <div id="watchSection">
                        <div class="section-label">Onde Assistir (Brasil)</div>
                        <div id="watchProviders" class="watch-providers"></div>
                    </div>
 
                    <div id="similarSection">
                        <div class="section-label">Filmes Similares</div>
                        <div id="similarMovies" class="similar-movies"></div>
                    </div>
                    <button class="main-btn" style="margin-top:30px; background:#475569;" onclick="window.scrollTo({top:0,behavior:'smooth'})">Voltar ao Topo</button>
                </div>
            </div>
        </div>
    </div>
 
    <script>
        const TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJkYjIxNTRkMGQ1N2QwNjQ5N2NlOGRkOWVkZTRkYzZiYiIsIm5iZiI6MTc3NjY4NjI2Ny45NDIwMDAyLCJzdWIiOiI2OWU2MTRiYjQ1OGFjYzdjZmU1MjBjOTYiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.DxSJCdCH6Siam-pgPu3IUkOO4erz7jtSIcT2nqp7Vl0';
        const BASE = 'https://api.themoviedb.org/3';
        const IMG = 'https://image.tmdb.org/t/p/w500';
        const LOGO = 'https://image.tmdb.org/t/p/original';
        let selectedGenres = new Set();
 
        async function fetchTMDB(path, params = {}) {
            const url = new URL(`${BASE}${path}`);
            Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
            const r = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
            return r.json();
        }
 
        function switchTab(t) {
            document.querySelectorAll('.panel, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(t + 'Panel').classList.add('active');
            document.getElementById('btn-' + t).classList.add('active');
            if(t === 'trending') loadTrending();
        }
 
        async function loadGenres() {
            const d = await fetchTMDB('/genre/movie/list', { language: 'pt-BR' });
            const gEl = document.getElementById('genres');
            d.genres.forEach(g => {
                const b = document.createElement('button');
                b.className = 'genre-btn';
                b.textContent = g.name;
                b.onclick = () => {
                    b.classList.toggle('active');
                    selectedGenres.has(g.id) ? selectedGenres.delete(g.id) : selectedGenres.add(g.id);
                };
                gEl.appendChild(b);
            });
        }
 
        async function loadTrending() {
            const d = await fetchTMDB('/trending/movie/week', { language: 'pt-BR' });
            renderGrid(d.results, 'trendingResults');
        }
 
        async function searchMovies() {
            const q = document.getElementById('query').value;
            if(!q) return;
            const d = await fetchTMDB('/search/movie', { language: 'pt-BR', query: q });
            renderGrid(d.results, 'searchResults');
        }
 
        function renderGrid(movies, targetId) {
            const el = document.getElementById(targetId);
            el.innerHTML = '';
            movies.slice(0, 18).forEach(m => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `<div class="rating-tag">${m.vote_average.toFixed(1)}</div><img src="${m.poster_path ? IMG + m.poster_path : 'https://via.placeholder.com/200x300?text=Sem+Capa'}"><p>${m.title}</p>`;
                div.onclick = () => showMovie(m.id);
                el.appendChild(div);
            });
        }
 
        async function sortear() {
            const gf = [...selectedGenres].join(',');
            const d = await fetchTMDB('/discover/movie', { language: 'pt-BR', with_genres: gf, page: Math.floor(Math.random() * 5) + 1, 'vote_count.gte': 150 });
            if(d.results.length) showMovie(d.results[Math.floor(Math.random() * d.results.length)].id);
        }
 
        async function showMovie(id) {
            const m = await fetchTMDB(`/movie/${id}`, { language: 'pt-BR', append_to_response: 'watch/providers,similar' });
            const card = document.getElementById('movieCard');
            card.style.display = 'block';
 
            document.getElementById('movieTitle').textContent = m.title;
            document.getElementById('movieRating').textContent = '★ ' + m.vote_average.toFixed(1);
            document.getElementById('movieYear').textContent = m.release_date ? m.release_date.slice(0,4) : '-';
            document.getElementById('movieOverview').textContent = m.overview || 'Sinopse indisponível.';
            document.getElementById('posterWrap').innerHTML = `<img src="${m.poster_path ? IMG + m.poster_path : 'https://via.placeholder.com/350x525?text=Sem+Poster'}">`;
 
            const gBox = document.getElementById('movieGenres');
            gBox.innerHTML = m.genres.map(g => `<span class="meta-item" style="background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.2); color:#fff;">${g.name}</span>`).join('');
 
            const wp = document.getElementById('watchProviders');
            wp.innerHTML = '';
            const pr = m['watch/providers']?.results?.BR?.flatrate || [];
            document.getElementById('watchSection').style.display = pr.length ? 'block' : 'none';
            pr.forEach(p => {
                const div = document.createElement('div');
                div.className = 'provider';
                div.innerHTML = `<img src="${LOGO + p.logo_path}"><span class="provider-name">${p.provider_name}</span>`;
                wp.appendChild(div);
            });
 
            const sm = document.getElementById('similarMovies');
            sm.innerHTML = '';
            const similar = m.similar?.results || [];
            document.getElementById('similarSection').style.display = similar.length ? 'block' : 'none';
            similar.slice(0, 6).forEach(s => {
                const div = document.createElement('div');
                div.className = 'similar-item';
                div.innerHTML = `<img src="${s.poster_path ? IMG + s.poster_path : 'https://via.placeholder.com/100x150?text=Sem+Capa'}"><p>${s.title}</p>`;
                div.onclick = (e) => { e.stopPropagation(); showMovie(s.id); };
                sm.appendChild(div);
            });
 
            card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
 
        loadGenres();
        loadTrending();
    </script>
</body>
</html>
