<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine Explorador</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <h1>
            <i class="fas fa-shuffle"></i>
            Cine Explorador
        </h1>

        <!-- Tabs -->
        <div class="tabs">

            <button
                class="tab-btn active"
                id="btn-trending"
                onclick="switchTab('trending')">
                Em Alta
            </button>

            <button
                class="tab-btn"
                id="btn-sort"
                onclick="switchTab('sort')">
                Sortear
            </button>

            <button
                class="tab-btn"
                id="btn-search"
                onclick="switchTab('search')">
                Filmes
            </button>

            <button
                class="tab-btn"
                id="btn-actors"
                onclick="switchTab('actors')">
                Atores
            </button>

            <button
                class="tab-btn"
                id="btn-watchlist"
                onclick="switchTab('watchlist')">
                ⏰ Mais Tarde
            </button>

        </div>

        <!-- Painel Sortear -->
        <div id="sortPanel" class="panel">

            <div class="section-label">
                <i class="fas fa-tags"></i>
                Escolha os Gêneros
            </div>

            <div id="genres" class="genres"></div>

            <div
                style="
                    margin-top: 25px;
                    display: flex;
                    justify-content: center;
                ">

                <button class="main-btn" onclick="sortear()">
                    <i class="fas fa-shuffle"></i>
                    Sortear Agora
                </button>

            </div>

        </div>

        <!-- Painel Buscar Filmes -->
        <div id="searchPanel" class="panel">

            <div class="search-box">

                <input
                    type="text"
                    id="query"
                    placeholder="Buscar filmes..."
                    onkeyup="if(event.key==='Enter'){ currentSearchPage=1; searchMovies(); }">

                <button
                    class="main-btn"
                    onclick="currentSearchPage=1; searchMovies()">

                    <i class="fas fa-search"></i>
                    Buscar

                </button>

            </div>

            <div id="searchResults" class="results-list"></div>

            <div
                id="loadMoreSearch"
                class="load-more"
                style="display:none">

                <button
                    class="load-more-btn"
                    onclick="searchMovies(true)">

                    Carregar Mais

                </button>

            </div>

        </div>

        <!-- Painel Atores -->
        <div id="actorsPanel" class="panel">

            <div class="search-box">

                <input
                    type="text"
                    id="actorQuery"
                    placeholder="Buscar atores e atrizes..."
                    onkeyup="if(event.key==='Enter'){ currentActorPage=1; searchActors(); }">

                <button
                    class="main-btn"
                    onclick="currentActorPage=1; searchActors()">

                    <i class="fas fa-user"></i>
                    Buscar

                </button>

            </div>

            <div id="actorResults" class="results-list"></div>

            <div
                id="loadMoreActors"
                class="load-more"
                style="display:none">

                <button
                    class="load-more-btn"
                    onclick="searchActors(true)">

                    Carregar Mais

                </button>

            </div>

        </div>

        <!-- Painel Trending -->
        <div id="trendingPanel" class="panel active">

            <div id="trendingResults" class="results-list"></div>

            <div class="load-more">

                <button
                    class="load-more-btn"
                    onclick="loadTrending(true)">

                    Carregar Mais Filmes

                </button>

            </div>

        </div>

        <!-- Watchlist -->
        <div id="watchlistPanel" class="panel">

            <div class="section-label">
                <i class="fas fa-clock"></i>
                Assistir Mais Tarde
            </div>

            <div
                id="watchlistEmpty"
                style="
                    display:none;
                    text-align:center;
                    color:var(--text-dim);
                    padding:40px 0;
                ">

                <i
                    class="fas fa-inbox"
                    style="
                        font-size:3rem;
                        margin-bottom:15px;
                        display:block;
                    ">
                </i>

                Nenhum filme salvo ainda.

            </div>

            <div id="watchlistResults" class="results-list"></div>

        </div>

        <!-- Card do Filme -->
        <div id="movieCard" class="movie-card">

            <div class="close-card" onclick="closeMovie()">
                <i class="fas fa-times"></i>
            </div>

            <div class="movie-content">

                <div class="poster-wrap" id="posterWrap"></div>

                <div class="movie-info">

                    <h2
                        id="movieTitle"
                        class="movie-title">
                    </h2>

                    <div class="meta">

                        <span
                            id="movieRating"
                            class="meta-item">
                        </span>

                        <span
                            id="movieYear"
                            class="meta-item">
                        </span>

                        <div
                            id="movieGenres"
                            style="display:contents">
                        </div>

                    </div>

                    <!-- Status + Trailer -->
                    <div id="movieStatus">

                        <div
                            id="trailerContainer"
                            style="display:none;">

                            <button
                                class="main-btn"
                                id="btnTrailer"
                                style="
                                    background:#ef4444;
                                    box-shadow:0 5px 15px rgba(239,68,68,0.3);
                                    padding:8px;
                                    font-size:0.85rem;
                                    border-radius:8px;
                                    margin-top:10px;
                                ">

                                <i class="fab fa-youtube"></i>

                            </button>

                        </div>

                    </div>

                    <!-- Botões principais -->
                    <div
                        style="
                            margin-bottom:10px;
                            display:flex;
                            flex-wrap:wrap;
                            gap:12px;
                            align-items:center;
                        ">

                        <button
                            class="main-btn"
                            id="btnWatchlist"
                            onclick="toggleWatchlist()">

                            <i class="fas fa-clock"></i>
                            Salvar para Mais Tarde

                        </button>

                    </div>

                    <!-- TMDB discreto -->
                    <div style="margin-bottom:25px;">

                        <a
                            id="tmdbLink"
                            href="#"
                            target="_blank"
                            style="
                                color:var(--text-dim);
                                font-size:0.75rem;
                                text-decoration:none;
                                display:inline-flex;
                                align-items:center;
                                gap:6px;
                            ">

                            <i class="fas fa-external-link-alt"></i>
                            Ver no TMDB

                        </a>

                    </div>

                    <!-- Sinopse -->
                    <div class="section-label">
                        <i class="fas fa-align-left"></i>
                        Sinopse
                    </div>

                    <p
                        id="movieOverview"
                        class="overview">
                    </p>

                    <!-- Elenco -->
                    <div id="castSection">

                        <div class="section-label">
                            <i class="fas fa-users"></i>
                            Elenco Principal
                        </div>

                        <div
                            id="movieCast"
                            class="cast-list">
                        </div>

                    </div>

                    <!-- Onde assistir -->
                    <div id="watchSection">

                        <div class="section-label">
                            <i class="fas fa-play-circle"></i>
                            Onde Assistir (Brasil)
                        </div>

                        <div
                            id="watchProviders"
                            class="watch-providers">
                        </div>

                    </div>

                    <!-- Similares -->
                    <div id="similarSection">

                        <div class="section-label">
                            <i class="fas fa-film"></i>
                            Filmes Similares
                        </div>

                        <div
                            id="similarMovies"
                            class="similar-movies">
                        </div>

                    </div>

                </div>
            </div>

        </div>

        <!-- Modal Portfólio -->
        <div id="portfolioModal">

            <div class="modal-content">

                <span
                    class="close-modal"
                    onclick="closePortfolio()">
                    ×
                </span>

                <div
                    id="actorInfo"
                    class="actor-header">
                </div>

                <div class="section-label">
                    <i class="fas fa-star"></i>
                    Principais Filmes
                </div>

                <div
                    id="portfolioGrid"
                    class="portfolio-grid">
                </div>

            </div>

        </div>

        <!-- Footer -->
        <footer>

            <p>
                Cine Explorador © 2026 | Dados do TMDB
            </p>

            <img
                src="https://www.themoviedb.org/assets/2/v4/logos/v2/blue_square_1-5bdc4501308a3d3c74384a39031d9990b719001382451f2f811b51152a537f88.svg"
                alt="TMDB Logo">

        </footer>

    </div>

    <script src="js/main.js"></script>

</body>

</html>
